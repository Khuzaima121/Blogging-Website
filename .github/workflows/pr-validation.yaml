name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  html-lint:
    name: Lint HTML Files
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install HTMLHint
      - name: Install HTMLHint
        run: npm install -g htmlhint

      # Lint HTML files
      - name: Run HTMLHint
        run: |
          htmlhint "**/*.html" --rules tagname-lowercase:true,attr-lowercase:true,alt-require:true,id-unique:true,tag-pair:true

  css-lint:
    name: Lint CSS Files
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install Stylelint
      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      # Lint CSS files
      - name: Run Stylelint
        run: |
          stylelint "**/*.css" --config '{ 
            "rules": { 
              "declaration-block-no-duplicate-properties": true, 
              "no-duplicate-selectors": true, 
              "property-case": "lower", 
              "value-keyword-case": "lower", 
              "selector-type-case": "lower", 
              "block-no-empty": true 
            } 
          }'

  build:
    name: Build Static Website
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build static website
      - name: Build website
        run: npm run build
