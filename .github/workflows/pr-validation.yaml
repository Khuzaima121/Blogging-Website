name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  html-lint:
    name: Lint HTML Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: |
          htmlhint "**/*.html" --rules tagname-lowercase:true,attr-lowercase:true,alt-require:true,id-unique:true,tag-pair:true

  css-lint:
    name: Lint CSS Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create Stylelint Configuration
        run: echo '{
            "rules": {
              "declaration-block-no-duplicate-properties": true,
              "no-duplicate-selectors": true,
              "property-case": "lower",
              "value-keyword-case": "lower",
              "selector-type-case": "lower",
              "block-no-empty": true
            }
          }' > .stylelintrc.json

      - name: Run Stylelint
        run: |
          stylelint "**/*.css"

  build:
    name: Build Static Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build
